<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>internal // zax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* Hilangkan tap highlight biru di semua elemen (HP) */
      -webkit-tap-highlight-color: transparent;
    }

    /* Elemen interaktif juga dipastikan tidak ada highlight biru */
    button,
    a,
    .link-card,
    .copy-btn {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --border: #1a1a1a;
      --border-hover: #2e2e2e;
      --text-primary: #e8e8e8;
      --text-muted: #4a4a4a;
      --text-dim: #282828;
      --accent: #c8ff00;
      --accent-dim: rgba(200, 255, 0, 0.06);
    }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    /* Animasi fade-in halus */
    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.25s ease-out;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .heading {
      font-size: 2rem;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .heading span {
      color: var(--text-muted);
    }

    .sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.18s;
    }

    .link-card:hover {
      border-color: var(--border-hover);
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-card:hover .icon-arrow {
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* Efek sentuh untuk HP (tanpa highlight biru) */
    .link-card:active {
      transform: scale(0.99);
      transition: transform 0.05s;
    }

    .link-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative;
    }

    .link-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .link-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .icon-arrow {
      font-size: 1rem;
      color: var(--text-dim);
      transition: transform 0.18s, color 0.18s;
      flex-shrink: 0;
      position: relative;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 2.5rem 0 1.25rem;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .copy-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--border-hover);
      transform: scale(0.97);
    }

    /* Efek sentuh untuk tombol copy di HP (tanpa highlight biru) */
    .copy-btn:active {
      transform: scale(0.95);
      transition: transform 0.05s;
    }

    .copy-btn.success {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Responsif untuk HP */
    @media (max-width: 480px) {
      .heading {
        font-size: 1.6rem;
      }

      .link-card {
        padding: 1rem;
      }
      
      /* Sedikit tambahan sentuhan agar lebih responsif */
      .link-card:active .icon-arrow {
        transform: translate(2px, -2px);
        color: var(--accent);
      }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">restricted access</div>

  <h1 class="heading">zax<span>/internal</span></h1>
  <p class="sub">2 portals</p>

  <div class="links">
    <a href="https://zaxhub.pages.dev" target="_blank" rel="noopener" class="link-card" title="buka zaxhub — rizz & ucapan">
      <div class="link-left">
        <span class="link-name">zaxhub</span>
        <span class="link-meta">pages.dev · volume1</span>
      </div>
      <span class="icon-arrow">↗</span>
    </a>

    <a href="https://secretbyzax.pages.dev" target="_blank" rel="noopener" class="link-card" title="buka secretbyzax — login: zaxganteng">
      <div class="link-left">
        <span class="link-name">secretbyzax</span>
        <span class="link-meta">pages.dev · volume2</span>
      </div>
      <span class="icon-arrow">↗</span>
    </a>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <span class="footer-tag">shh · untuk dirimu saja</span>
    <button class="copy-btn" id="copyBtn">copy url</button>
  </div>
</div>

<script>
  const btn = document.getElementById('copyBtn');
  
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(location.href).then(() => {
      btn.textContent = 'copied ✓';
      btn.classList.add('success');
      setTimeout(() => {
        btn.textContent = 'copy url';
        btn.classList.remove('success');
      }, 1800);
    }).catch(() => {
      btn.textContent = 'copy manually';
      setTimeout(() => { btn.textContent = 'copy url'; }, 1200);
    });
  });
</script>

</body>
</html>
